<!DOCTYPE html>
<html lang="en">

<head>
  <!-- BASIC SEO -->
  <title>📈 Free SIP Calculator – Investment Growth, Compound Interest & Wealth Tracker (Lakh & Crore)</title>
  <meta name="description"
    content="Free investment calculator to calculate SIP returns, compound interest, yearly growth, profit analysis in Lakh and Crore format. Mobile friendly finance tool." />
  <meta name="keywords"
    content="investment calculator, sip calculator, compound interest calculator, mutual fund calculator, roi calculator, finance calculator, crore calculator, lakh calculator, wealth growth calculator" />
  <meta name="author" content="Your Name" />

  <!-- VIEWPORT -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- OPEN GRAPH (for WhatsApp / LinkedIn sharing) -->
  <meta property="og:title" content="Investment Calculator - SIP & Compound Growth Tool" />
  <meta property="og:description"
    content="Calculate SIP returns, profit, and investment growth in Lakh & Crore format." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://UmerShujaDev.github.io/sip-investment-calculator-lakh-crore/preview.png" />

  <!-- TWITTER CARD -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Investment Calculator" />
  <meta name="twitter:description" content="SIP & compound interest calculator with yearly breakdown." />
  <meta name="twitter:image" content="https://umershujadev.github.io/sip-investment-calculator-lakh-crore/preview.png" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 15px;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      font-size: 20px;
    }

    label {
      font-size: 12px;
      display: block;
      margin-top: 10px;
    }

    select,
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      font-size: 15px;
    }

    .summary {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 15px;
    }

    .box {
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 13px;
    }

    .invested {
      background: #eef2ff;
    }

    .profit {
      background: #e6fffa;
    }

    .total {
      background: #f3f3f3;
    }

    canvas {
      margin-top: 15px;
      width: 100% !important;
      max-height: 220px;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-top: 15px;
    }

    table {
      width: 100%;
      min-width: 450px;
      border-collapse: collapse;
      font-size: 12px;
    }

    th,
    td {
      border: 1px solid #eee;
      padding: 6px;
      text-align: center;
      white-space: nowrap;
    }

    th {
      background: #f5f5f5;
    }

    /* Hide number input arrows (spinner) */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type=number] {
      -moz-appearance: textfield;
      /* Firefox */
    }

    @media (min-width: 768px) {
      .card {
        max-width: 900px;
      }

      .summary {
        flex-direction: row;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <h2>Investment Calculator</h2>

    <!-- FORM -->
    <div class="grid">

      <div>
        <label>Currency</label>
        <select id="currency">
          <option value="PKR">PKR</option>
          <option value="$">USD</option>
          <option value="₹">INR</option>
          <option value="€">EUR</option>
        </select>
      </div>

      <div>
        <label>Monthly Investment</label>
        <input id="monthly" type="number" placeholder="1000" />
      </div>

      <div>
        <label>Years</label>
        <input id="years" type="number" placeholder="10" />
      </div>

      <div>
        <label>Return %</label>
        <input id="rate" type="number" placeholder="12" />
      </div>

    </div>

    <button onclick="calculate()">Calculate</button>

    <!-- SUMMARY -->
    <div class="summary">
      <div class="box invested" id="investedBox">Invested: -</div>
      <div class="box profit" id="profitBox">Profit: -</div>
      <div class="box total" id="totalBox">Total: -</div>
    </div>

    <!-- CHART -->
    <canvas id="chart"></canvas>

    <!-- TABLE -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Year</th>
            <th>Invested</th>
            <th>Value</th>
            <th>Profit</th>
          </tr>
        </thead>
        <tbody id="yearTable"></tbody>
      </table>
    </div>

  </div>

  <script>
    let chart;

    /* ---------------- FORMATTERS ---------------- */

    function formatNumber(num) {
      return new Intl.NumberFormat('en-US').format(Math.round(num));
    }

    function formatReadable(num) {
      const abs = Math.abs(num);

      if (abs >= 10000000) {
        return (num / 10000000).toFixed(2) + " Crore";
      }
      if (abs >= 100000) {
        return (num / 100000).toFixed(2) + " Lakh";
      }
      if (abs >= 1000) {
        return (num / 1000).toFixed(2) + " K";
      }
      return num.toFixed(0);
    }

    /* ---------------- MAIN CALC ---------------- */

    function calculate() {
      const currency = document.getElementById("currency").value;
      const monthly = parseFloat(document.getElementById("monthly").value);
      const years = parseInt(document.getElementById("years").value);
      const rate = parseFloat(document.getElementById("rate").value);

      if (!monthly || !years || !rate) return;

      const n = 12;
      const r = rate / 100;

      let value = 0;
      let yearly = [];

      for (let y = 1; y <= years; y++) {
        for (let m = 0; m < 12; m++) {
          value = (value + monthly) * (1 + r / n);
        }

        const invested = monthly * y * 12;

        yearly.push({
          year: y,
          invested,
          value,
          profit: value - invested
        });
      }

      const totalInvested = monthly * years * 12;
      const profit = value - totalInvested;

      /* SUMMARY */
      document.getElementById("investedBox").innerText =
        `Invested: ${currency} ${formatNumber(totalInvested)} (${formatReadable(totalInvested)})`;

      document.getElementById("profitBox").innerText =
        `Profit: ${currency} ${formatNumber(profit)} (${formatReadable(profit)})`;

      document.getElementById("totalBox").innerText =
        `Total: ${currency} ${formatNumber(value)} (${formatReadable(value)})`;

      renderTable(yearly, currency);
      renderChart(totalInvested, profit);
    }

    /* ---------------- TABLE ---------------- */

    function renderTable(data, currency) {
      const tbody = document.getElementById("yearTable");
      tbody.innerHTML = "";

      data.forEach(d => {
        tbody.innerHTML += `
      <tr>
        <td>${d.year}</td>
        <td>${currency} ${formatNumber(d.invested)}</td>
        <td>${currency} ${formatNumber(d.value)}</td>
        <td>${currency} ${formatNumber(d.profit)}</td>
      </tr>
    `;
      });
    }

    /* ---------------- CHART ---------------- */

    function renderChart(invested, profit) {
      const ctx = document.getElementById("chart");

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: ["Invested", "Profit"],
          datasets: [{
            data: [invested, profit],
            backgroundColor: ["#667eea", "#38b2ac"]
          }]
        },
        options: {
          plugins: {
            legend: { position: "bottom" }
          }
        }
      });
    }
  </script>

</body>

</html>
